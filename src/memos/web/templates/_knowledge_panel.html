<!-- ====== F6: 记忆管理面板 ====== -->
<div class="tab-pane fade show active" id="knowledge-panel" role="tabpanel">

    <!-- === 固定头部：统计 + 工具栏 + 搜索 + 分页 === -->
    <div style="flex-shrink:0;">
    <!-- === 统计行 === -->
    <div class="row g-2 mt-2 mb-2" id="mm-stats-row">
        <div class="col"><div class="card text-center py-2"><div class="small text-secondary">知识总数</div><div class="fw-bold" id="mm-stat-total" style="font-size:.95rem">-</div></div></div>
        <div class="col"><div class="card text-center py-2"><div class="small text-secondary">已遗忘</div><div class="fw-bold" id="mm-stat-forgotten" style="font-size:.95rem">-</div></div></div>
        <div class="col"><div class="card text-center py-2"><div class="small text-secondary">已归档</div><div class="fw-bold" id="mm-stat-archived" style="font-size:.95rem">-</div></div></div>
        <div class="col"><div class="card text-center py-2"><div class="small text-secondary">待归档</div><div class="fw-bold" id="mm-stat-expiring" style="font-size:.95rem">-</div></div></div>
    </div>

    <!-- === 顶部工具栏 === -->
    <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
        <!-- 类型过滤 pills -->
        <div class="d-flex flex-wrap gap-1" id="mm-type-pills">
            <button class="btn btn-sm btn-primary mm-type-pill active" data-type="">全部</button>
            <button class="btn btn-sm btn-outline-secondary mm-type-pill" data-type="solution">方案</button>
            <button class="btn btn-sm btn-outline-secondary mm-type-pill" data-type="decision">决策</button>
            <button class="btn btn-sm btn-outline-secondary mm-type-pill" data-type="lesson">经验</button>
            <button class="btn btn-sm btn-outline-secondary mm-type-pill" data-type="process">流程</button>
        </div>
        <div class="ms-auto d-flex gap-1">
            <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#addModal">
                <i class="bi bi-plus-lg"></i> 添加
            </button>
        </div>
    </div>

    <!-- === 搜索栏 === -->
    <div class="mb-2">
        <div class="input-group input-group-sm">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control" id="mm-search-query" placeholder="搜索记忆..." autocomplete="off">
            <button class="btn btn-outline-secondary" id="mm-search-clear" title="清除"><i class="bi bi-x-lg"></i></button>
        </div>
    </div>

    <!-- === 状态标签 === -->
    <div class="d-flex justify-content-between align-items-center mb-2">
        <span class="small text-secondary" id="mm-status-label">加载中...</span>
        <nav id="mm-pagination-nav" class="d-flex align-items-center gap-1"></nav>
    </div>
    </div>
    <!-- === /固定头部 === -->

    <!-- === 记忆卡片列表（可滚动） === -->
    <div id="mm-card-container" class="row g-2">
        <div class="col-12 text-center text-secondary py-5">
            <div class="spinner-border spinner-border-sm me-2" role="status"></div>
            <span>加载中...</span>
        </div>
    </div>


</div>
