<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEMOS — 登录</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .login-card {
    background: #fff;
    border-radius: 12px;
    padding: 40px;
    width: 400px;
    max-width: 90vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .login-card h1 {
    font-size: 24px; color: #1a1a2e; margin-bottom: 8px;
  }
  .login-card p {
    font-size: 14px; color: #666; margin-bottom: 24px;
  }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block; font-size: 14px; font-weight: 600;
    color: #333; margin-bottom: 6px;
  }
  .form-group input {
    width: 100%; padding: 10px 12px; border: 1px solid #d1d5db;
    border-radius: 8px; font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: #0f3460; }
  .btn {
    width: 100%; padding: 12px; background: #0f3460; color: #fff;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
  }
  .btn:hover { background: #1a4a8a; }
  .error-msg {
    background: #fef2f2; color: #dc2626; padding: 10px 14px;
    border-radius: 8px; font-size: 14px; margin-bottom: 16px; display: none;
  }
  .error-msg.show { display: block; }
</style>
</head>
<body>
<div class="login-card">
  <h1>MEMOS 仪表板</h1>
  <p>请输入访问 Token 以继续</p>
  <div id="error" class="error-msg"></div>
  <form id="login-form">
    <div class="form-group">
      <label for="token">访问 Token</label>
      <input type="password" id="token" name="token"
             placeholder="运行 memos init 时生成的 Token"
             autocomplete="off" autofocus>
    </div>
    <button type="submit" class="btn">登 录</button>
  </form>
</div>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const token = document.getElementById('token').value;
  const errorEl = document.getElementById('error');
  errorEl.classList.remove('show');

  try {
    const resp = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token }),
    });
    if (resp.ok) {
      window.location.href = '/';
    } else {
      const data = await resp.json();
      errorEl.textContent = data.error || '登录失败';
      errorEl.classList.add('show');
    }
  } catch (err) {
    errorEl.textContent = '网络错误，请检查服务是否运行';
    errorEl.classList.add('show');
  }
});
</script>
</body>
</html>
