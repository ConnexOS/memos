<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>收件箱 - MEMOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="toast-container" id="toast-container"></div>

{% include "_nav.html" %}

<div class="container-fluid py-3" id="inbox-page">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">
            <a href="/" class="text-decoration-none text-reset" title="返回主页">
                <i class="bi bi-arrow-left me-1"></i>
            </a>
            <i class="bi bi-bell me-2"></i>收件箱
        </h4>
        <div class="d-flex gap-2">
            <a href="/" class="btn btn-sm btn-outline-primary">
                <i class="bi bi-house me-1"></i><span class="d-none d-sm-inline">返回主页</span>
            </a>
            <button class="btn btn-sm btn-outline-secondary" id="inbox-dismiss-all" onclick="inboxDismissAll()">
                <i class="bi bi-check2-all me-1"></i>全部已读
            </button>
        </div>
    </div>

    <!-- Tab 导航：三区布局 -->
    <ul class="nav nav-tabs mb-3" id="inboxTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="inbox-tab-system" data-bs-toggle="tab"
                    data-bs-target="#inbox-system" type="button" role="tab">
                系统通知 <span class="badge bg-secondary ms-1" id="badge-system">0</span>
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="inbox-tab-watchlist" data-bs-toggle="tab"
                    data-bs-target="#inbox-watchlist" type="button" role="tab">
                待关注 <span class="badge bg-secondary ms-1" id="badge-watchlist">0</span>
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="inbox-tab-pending" data-bs-toggle="tab"
                    data-bs-target="#inbox-pending" type="button" role="tab">
                待修正 <span class="badge bg-secondary ms-1" id="badge-pending">0</span>
            </button>
        </li>
    </ul>

    <div class="tab-content" id="inboxTabContent">
        <!-- 系统通知 -->
        <div class="tab-pane fade show active" id="inbox-system" role="tabpanel">
            <div id="inbox-system-list" class="list-group"></div>
        </div>
        <!-- 待关注 -->
        <div class="tab-pane fade" id="inbox-watchlist" role="tabpanel">
            <div id="inbox-watchlist-list" class="list-group"></div>
        </div>
        <!-- 待修正 -->
        <div class="tab-pane fade" id="inbox-pending" role="tabpanel">
            <div id="inbox-pending-list" class="list-group"></div>
        </div>
    </div>
</div>

{% include "_modals.html" %}

<script src="/static/js/nav-modals.js?v={{ version }}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/logout.js?v={{ version }}"></script>
<script src="/static/js/inbox.js?v={{ version }}"></script>
</body>
</html>
