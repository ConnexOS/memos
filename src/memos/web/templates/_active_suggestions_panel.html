        <!-- ====== 主动建议 Tab ====== -->
        <div class="tab-pane fade" id="suggestions-panel" role="tabpanel">
            <!-- 顶部工具栏 -->
            <div class="d-flex justify-content-between align-items-center mt-2 mb-1" style="min-height:31px">
                <div><span class="small fw-semibold">建议管理</span></div>
                <div class="d-flex align-items-center gap-2">
                    <button class="btn btn-sm btn-outline-danger py-0 d-none" id="sug-clear-history-btn" title="清空所有历史建议"><i class="bi bi-trash"></i> 清空历史</button>
                    <button class="btn btn-sm btn-outline-success py-0" onclick="window.promoteToSuggestion && promoteToSuggestion('')" title="新建手工建议"><i class="bi bi-plus-lg"></i></button>
                    <button class="btn btn-sm btn-outline-secondary py-0" id="sug-settings-btn" title="建议设置"><i class="bi bi-gear"></i></button>
                    <div class="d-flex align-items-center gap-1">
                        <div class="form-check form-switch d-inline-block mb-0" style="min-height:1em">
                            <input class="form-check-input" type="checkbox" id="sug-pause-toggle" role="switch" style="margin-top:0">
                        </div>
                        <label class="small text-nowrap" for="sug-pause-toggle">暂停推送</label>
                    </div>
                </div>
            </div>

            <!-- 五个统计卡片（前四可点击筛选，反馈指标仅展示） -->
            <div class="row g-2 mb-2" id="sug-stats-row">
                <div class="col sug-stat-card" data-filter="pending">
                    <div class="card text-center py-2 cursor-pointer" style="cursor:pointer">
                        <div class="small text-secondary">待处理</div>
                        <div class="fw-bold sug-stat-count" id="sug-stat-pending" style="font-size:.95rem">-</div>
                    </div>
                </div>
                <div class="col sug-stat-card" data-filter="processed">
                    <div class="card text-center py-2 cursor-pointer" style="cursor:pointer">
                        <div class="small text-secondary">已处理</div>
                        <div class="fw-bold sug-stat-count" id="sug-stat-processed" style="font-size:.95rem">-</div>
                    </div>
                </div>
                <div class="col sug-stat-card" data-filter="manual">
                    <div class="card text-center py-2 cursor-pointer" style="cursor:pointer">
                        <div class="small text-secondary">人工建议</div>
                        <div class="fw-bold sug-stat-count" id="sug-stat-manual" style="font-size:.95rem">-</div>
                    </div>
                </div>
                <div class="col sug-stat-card" data-filter="history">
                    <div class="card text-center py-2 cursor-pointer" style="cursor:pointer">
                        <div class="small text-secondary">历史建议</div>
                        <div class="fw-bold sug-stat-count" id="sug-stat-history" style="font-size:.95rem">-</div>
                    </div>
                </div>
                <!-- 注入监控统计卡片（点击展开注入监控面板） -->
                <div class="col sug-stat-card" id="sug-injection-card" data-filter="injection" style="cursor:pointer">
                    <div class="card text-center py-2 cursor-pointer" style="cursor:pointer">
                        <div class="small text-secondary">注入监控</div>
                        <div class="fw-bold sug-stat-count" id="sug-stat-injection" style="font-size:.95rem">-</div>
                    </div>
                </div>
                <!-- 反馈指标卡片（非点击，仅在待处理/已处理/历史建议视图显示） -->
                <div class="col" id="sug-feedback-col">
                    <div class="card text-center py-2">
                        <div class="small text-secondary">反馈指标</div>
                        <div class="d-flex justify-content-center gap-2 mt-1 small flex-wrap" id="sug-feedback-body">
                            <span>总数 <span id="stat-sug-total" class="fw-semibold">0</span></span>
                            <span class="text-success">有用 <span id="stat-sug-useful" class="fw-semibold">0</span></span>
                            <span class="text-danger">无用 <span id="stat-sug-not-useful" class="fw-semibold">0</span></span>
                            <span>已读 <span id="stat-sug-dismissed" class="fw-semibold">0</span></span>
                            <span>采纳率 <span id="stat-sug-rate" class="fw-semibold">-</span></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 列表区域（各统计卡片共享：待处理/已处理/人工建议/历史建议/注入监控） -->
            <div id="sug-list" class="sug-list">
                <div class="text-center text-secondary small py-5" id="sug-empty">
                    <i class="bi bi-inbox" style="font-size:2rem"></i>
                    <div class="mt-2">暂无待处理的建议</div>
                    <div class="small text-secondary opacity-75 mt-1">当你进行与历史知识相关的对话时，MEMOS 会自动在这里推送相关记忆。</div>
                </div>
            </div>

        </div>
