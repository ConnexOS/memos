            <!-- ====== 待办事项 Tab ====== -->
            <div class="tab-pane fade" id="todo-panel" role="tabpanel">
                <div class="row g-2 mt-2">
                    <div class="col-12">
                        <!-- 顶部工具栏 -->
                        <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-1">
                            <div class="d-flex align-items-center gap-2">
                                <span class="fw-semibold small">筛选</span>
                                <select class="form-select form-select-sm" id="todo-filter" style="width:auto;font-size:.8rem" onchange="loadTodos()">
                                    <option value="">全部</option>
                                    <option value="pending" selected>待处理</option>
                                    <option value="in_progress">进行中</option>
                                    <option value="completed">已完成</option>
                                    <option value="cancelled">已取消</option>
                                </select>
                                <span class="fw-semibold small ms-2">排序</span>
                                <select class="form-select form-select-sm" id="todo-sort" style="width:auto;font-size:.8rem" onchange="onTodoSortChange()">
                                    <option value="priority">优先级</option>
                                    <option value="created_at" selected>创建时间</option>
                                    <option value="custom">自定义</option>
                                </select>
                                <div class="form-check form-check-inline d-inline-block">
                                    <input class="form-check-input" type="checkbox" id="todo-show-archived" onchange="loadTodos()">
                                    <label class="form-check-label small" for="todo-show-archived">显示已归档</label>
                                </div>
                            </div>
                            <button class="btn btn-sm btn-outline-primary py-0 px-2" onclick="showCreateTodoModal()" style="font-size:.8rem">
                                <i class="bi bi-plus-lg"></i> 新建待办
                            </button>
                        </div>
                        <!-- 待办列表 -->
                        <div id="todo-list">
                            <div class="text-muted small text-center py-3">加载中...</div>
                        </div>
                    </div>
                </div>
            </div>
